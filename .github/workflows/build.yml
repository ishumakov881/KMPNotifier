name: Build

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
    paths-ignore:
      - '**/README.md'
  pull_request:
    branches: [ "main" ]

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check api
        run: ./gradlew apiCheck

  build:
    strategy:
      matrix:
        config: [
          { target: android, os: ubuntu-latest, tasks: ":kmpnotifier:testDebugUnitTest :kmpnotifier:testReleaseUnitTest", continueOnError: false },
          { target: apple, os: macos-latest, tasks: ":kmpnotifier:iosX64Test :kmpnotifier:iosSimulatorArm64Test", continueOnError: false },
          { target: all-publications, os: macos-latest, tasks: ":kmpnotifier:publishToMavenLocal -Psigning.required=false", continueOnError: false },
        ]
    runs-on: ${{ matrix.config.os }}
    name: Build ${{ matrix.config.target }}
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install CocoaPods
        if: runner.os == 'macOS'
        run: sudo gem install cocoapods

      - name: Test ${{ matrix.config.target }} targets
        continue-on-error: ${{ matrix.config.continueOnError }}
        run: ./gradlew ${{ matrix.config.tasks }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    needs:
      - build

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Validate publishable artifacts
        run: ./gradlew :kmpnotifier:publishToMavenLocal -Psigning.required=false --no-configuration-cache

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: ./gradlew :kmpnotifier:publishToMavenCentral --no-configuration-cache

      - name: Create new release from tag
        env:
          github_token: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          token: ${{ env.github_token }}
